<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1a1a2e"/>
  <!-- Robot body -->
  <circle cx="128" cy="138" r="70" fill="#e0e0e0" stroke="#333" stroke-width="3"/>
  <!-- Top bumper -->
  <path d="M68 110 Q128 50 188 110" fill="none" stroke="#0077b6" stroke-width="6" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="105" cy="125" r="10" fill="#0077b6"/>
  <circle cx="151" cy="125" r="10" fill="#0077b6"/>
  <!-- Eye highlights -->
  <circle cx="108" cy="122" r="3" fill="#fff"/>
  <circle cx="154" cy="122" r="3" fill="#fff"/>
  <!-- Mouth / sensor line -->
  <rect x="108" y="155" width="40" height="4" rx="2" fill="#555"/>
  <!-- DJI text -->
  <text x="128" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="24" fill="#0077b6">DJI ROMO</text>
</svg>
