clean_rooms:
  name: Clean specific rooms
  description: Start cleaning selected rooms with per-room settings.
  fields:
    entity_id:
      name: Vacuum entity
      description: The vacuum entity to control.
      required: true
      selector:
        entity:
          integration: dji_romo
          domain: vacuum
    rooms:
      name: Rooms
      description: >
        List of rooms to clean. Each room needs at minimum a "name" matching
        a room on the map (e.g. "Kitchen", "Bedroom"). Optional per-room
        settings: clean_mode (0=Vacuum+Mop, 1=Vacuum then Mop, 2=Vacuum,
        3=Mop), fan_speed (1=Quiet, 2=Standard, 3=Max), water_level (1-3),
        clean_num (1-3 passes).
      required: true
      example: '[{"name": "Kitchen", "clean_mode": 2, "fan_speed": 3}, {"name": "Bedroom"}]'
      selector:
        object:
